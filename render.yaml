services:
  - type: web
    name: gcc2050
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 server:app -b :10000
    repo: https://github.com/alpha-1-design/Core-x
    branch: main
    healthCheckPath: /health
    autoDeploy: no
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"